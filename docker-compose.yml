services:
  db:
    image: postgres:16-alpine
    container_name: eleitoral2026-db
    environment:
      POSTGRES_USER: eleitoral
      POSTGRES_PASSWORD: eleitoral
      POSTGRES_DB: eleitoral2026
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U eleitoral -d eleitoral2026"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
