<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — {{ app_nome }}</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@fortawesome/fontawesome-free@6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body class="auth-page">
    <div class="auth-card">
        <div class="auth-brand">
            <i class="fas fa-vote-yea"></i>
            <h1>Eleitoral<strong>{{ ano_eleicao }}</strong></h1>
            <p>Acesse o painel de monitoramento</p>
        </div>

        {% with msgs = get_flashed_messages(with_categories=true) %}
            {% if msgs %}
                {% for category, msg in msgs %}
                    <div class="flash flash-{{ category }} auth-flash">
                        {{ msg }}
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST" action="{{ url_for('auth.login', next=request.args.get('next')) }}" class="auth-form">
            <div class="form-group">
                <label for="email">E-mail</label>
                <input type="email" id="email" name="email" required autofocus
                       placeholder="seu@email.com" autocomplete="username">
            </div>
            <div class="form-group">
                <label for="senha">Senha</label>
                <input type="password" id="senha" name="senha" required
                       placeholder="••••••••" autocomplete="current-password">
            </div>
            <label class="auth-remember">
                <input type="checkbox" name="lembrar" value="1">
                Manter conectado
            </label>
            <button type="submit" class="btn-primary auth-submit">
                <i class="fas fa-sign-in-alt"></i> Entrar
            </button>
        </form>
    </div>
</body>
</html>
